###########################################################
### Welcome to Beautiful Jekyll!
### This config file is meant for settings that affect your entire website. When you first
### set up your website you should go through all these settings and edit them, but after
### the initial set up you won't need to come back to this file often.
###########################################################

############################
# --- Required options --- #
############################

title: Charlie Yaris | Data Engineer

# Your name to show in the footer
author: Charlie Yaris

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  About Me: about_me
  Projects:
    - The Networks of War: the_networks_of_war
    - US Gun Violence Forecasting: us_gun_violence_forecasting
    - Mastermind: mastermind
    # - Tableau Gallery: tableau_gallery
  Blog: blog
  Contact: contact
  Resume: resume

################
# --- Logo --- #
################

# Image to show in the navigation bar - works best with a square image
# Remove this parameter if you don't want an image in the navbar
avatar: /assets/img/minocqua_ice_fishing.png
# avatar: /assets/img/me_at_joshua_tree.png

# By default, the image is cut into a circle. You can disable this behaviour by setting 'round-avatar: false'
round-avatar: true

# If you want to have an image logo in the top-left corner instead of having the title of the website,
# then specify the following parameter
# title-img: /assets/img/bialy_1.png


#####################################
# --- Footer social media links --- #
#####################################

# Select the social network links that you want to show in the footer.
# You can change the order that they show up on the page by changing the order here.
# Uncomment the links you want to show and add your information to each one.
social-network-links:
  email: true
  linkedin: charlieyaris
  github: cyaris
  # tableau: charlie.yaris#!
  # kaggle: cyaris
  instagram: lord_buttonless

# If you want your website to generate an RSS feed, provide a description
# The URL for the feed will be https://<your_website>/feed.xml
rss-description: Welcome to my website! I hope you enjoy your stay.

###########################
# --- General options --- #
###########################

# Select which social network share links to show in posts
share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  vk: false
  github: true
  reddit: false

# How to display the link to your website in the footer
# Remove this if you don't want a link in the footer
url-pretty: charlieyaris.com

# Add the website title to the title of every page
title-on-all-pages: true

# Excerpt word length - Truncate the excerpt of each post on the feed page to the specified number of words
excerpt_length: 50

# Whether or not to show an excerpt for every blog post in the feed page
feed_show_excerpt: false

# Whether or not to show a list of tags below each post preview in the feed page
feed_show_tags: true

# Add a button in the footer to edit the current page. Only works if your website is hosted on GitHub
edit_page_button: false

# Allow sub-menu items (second-level navigation menu items) to be longer than the top-level menu
# If this setting is off, then long sub-menu words might get cut off
# See https://github.com/daattali/beautiful-jekyll/issues/765 to understand the issue this setting can solve
navbar-var-length: false

# The keywords to associate with your website, for SEO purposes
keywords: cyaris, charlie yaris, charlieyaris, yaris

######################################
# --- Colours / background image --- #
######################################

# Personalize the colours in your website. Colour values can be any valid CSS colour

navbar-col: "#54bdca"
# navbar-dropdown-background-hover-col: "#4aa4b0"
navbar-border-col: "#f26419"
navbar-link-col: "#ffffff"
navbar-link-hover-col: "#175676"

page-col: "#ffffff"
link-col: "#1b998b"
post-title-link-hover-col: "#1b998b"
# post-title-link-hover-col: ""#54bdca"

footer-col: "#54bdca"
footer-border-col: "#f26419"
footer-text-col: "#ffffff"
footer-link-col: "#ffffff"
footer-link-hover-col: "#175676"

# social-links will have separate color variables from rest of footer
social-icon-col: "#ffffff"
social-icon-background-col: "#f07b41"
social-icon-hover-col: "#f26419"
social-icon-background-hover-col: "#ffffff"
# social-icon-background-border-hover-col: "#f26419"

btn-link-col: "#ffffff"
btn-background-col: "#f07b41"
btn-link-hover-col: "#ffffff"
btn-background-hover-col: "#f07b41"
btn-border-hover-col: "#c44536"

pagination-link-col: "#ffffff"
pagination-background-col: "#20b3a1"
pagination-border-col: "#20b3a1"
pagination-link-hover-col: "#ffffff"
pagination-background-hover-col: "#20b3a1"
pagination-border-hover-col: "#197278"

tag-link-col: "#404040"
tag-link-hover-col: "#1b998b"
tag-background-hover-col: "#ffffff"
tag-border-hover-col: "#1b998b"

# Alternatively, the navbar, footer, and page background can be set to an image
# instead of colour

#navbar-img: "/assets/img/bgimage.png"
#footer-img: "/assets/img/bgimage.png"
#page-img: "/assets/img/bgimage.png"

# Suggest a colour for mobile browsers to use as the browser's theme. This is only supported by a few mobile browsers.
#mobile-theme-col: "#0085A1"

# For any extra visual customization, you can include additional CSS files in every page on your site. List any custom CSS files here
#site-css:
#  - "/assets/css/custom-styles.css"

# If you have common JavaScript files that should be included in every page, list them here
#site-js:
#  - "/assets/js/custom-script.js"

#################################
# --- Web Analytics Section --- #
#################################

# Fill in your Google Analytics tag ID (or "Measurement ID") to track your website usage
gtag: G-ZGW0J5HTZ8

# Fill in your Cloudflare Analytics beacon token to track your website using Cloudflare Analytics
#cloudflare_analytics: ""

# Google Tag Manager ID
#gtm: ""

# Google Universal Analytics ID -- deprecated
# As of July 2023 this is no longer supported by Google! If you are still using `google_analytics`,
# you should switch to using the `gtag` field above instead.
#google_analytics: "UA-XXXXXXXX-X"

################
# --- Misc --- #
################

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"

# Facebook App ID
#fb_app_id: ""

#################################################################################
# --- You don't need to touch anything below here (but you can if you want) --- #
#################################################################################

# Output options (more information on Jekyll's site)
timezone: America/Chicago
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 15

kramdown:
  input: GFM

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: posts
    values:
      layout: post
      type: "posts"
      social-share: false # add social media sharing buttons to all blog posts
  -
    scope:
      path: "" # any file that's not a post will be a "page" layout by default
    values:
      layout: "page"

# Exclude these files from production site
exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

# Beautiful Jekyll / Dean Attali
# 2fc73a3a967e97599c9763d05e564189

################
# --- Custom Variables --- #
################

s3_bucket: https://s3.us-east-2.amazonaws.com/cyaris.github.io
# Leave blank for live production bundles. Set to "test_" when intentionally loading staged bundle uploads.
s3_bundle_prefix:
# Options: runtime for active development without Jekyll rebuilds, build_time for quieter periods.
s3_bundle_cache_bust_strategy: build_time
