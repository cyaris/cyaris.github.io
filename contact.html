---
layout: page
title: Contact
---
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<form id="contact-form" class="contact-form">
  <div class="contact-field">
    <label for="contact-name">Name</label>
    <input id="contact-name" name="name" type="text" autocomplete="name" maxlength="100" required>
  </div>
  <div class="contact-field">
    <label for="contact-email">Email</label>
    <input id="contact-email" name="email" type="email" autocomplete="email" maxlength="254" required>
  </div>
  <div class="contact-field">
    <label for="contact-subject">Subject</label>
    <input id="contact-subject" name="subject" type="text" maxlength="150" required>
  </div>
  <div class="contact-field">
    <label for="contact-message">Message</label>
    <textarea id="contact-message" name="message" rows="8" maxlength="5000" required></textarea>
  </div>
  <div class="contact-honeypot" aria-hidden="true">
    <label for="contact-website">Website</label>
    <input id="contact-website" name="website" type="text" tabindex="-1" autocomplete="off">
  </div>
  <div class="contact-turnstile">
    <div
      class="cf-turnstile"
      data-sitekey="0x4AAAAAADy94v3LKGOnSzTn"
      data-theme="light"
      data-size="flexible"
    ></div>
  </div>
  <button id="contact-submit" type="submit">Send Message</button>
  <p id="contact-status" class="contact-status" role="status" aria-live="polite" hidden></p>
</form>

<script>
  ;(() => {
    const form = document.getElementById('contact-form')
    const button = document.getElementById('contact-submit')
    const status = document.getElementById('contact-status')

    const endpoint = 'https://contact-form-worker.charlieyaris.workers.dev'
    const setStatus = (message = '', state = '') => {
      status.textContent = message
      status.dataset.state = state
      status.hidden = !message
    }

    form.addEventListener('submit', async event => {
      event.preventDefault()

      const formData = new FormData(form)
      const turnstileToken = formData.get('cf-turnstile-response')

      if (!turnstileToken) {
        setStatus('Please complete the spam verification.', 'error')
        return
      }

      button.disabled = true
      button.textContent = 'Sending…'
      setStatus()

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            name: formData.get('name'),
            email: formData.get('email'),
            subject: formData.get('subject'),
            message: formData.get('message'),
            website: formData.get('website'),
            turnstileToken,
          }),
        })

        const result = await response.json()

        if (!response.ok) {
          throw new Error(result.error || "Sorry, your message couldn't be sent.")
        }

        form.reset()
        turnstile.reset()

        setStatus('Thanks for reaching out!', 'success')
      } catch (error) {
        setStatus(error.message || "Sorry, your message couldn't be sent. Please try again.", 'error')

        turnstile.reset()
      } finally {
        button.disabled = false
        button.textContent = 'Send message'
      }
    })
  })()
</script>
