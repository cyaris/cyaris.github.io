---
layout: page
title: Contact
---
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<form id="contact-form" class="contact-form">
  <div class="contact-field">
    <label for="contact-name">Name</label>
    <input id="contact-name" name="name" type="text" autocomplete="name" maxlength="100" required>
  </div>
  <div class="contact-field">
    <label for="contact-email">Email</label>
    <input id="contact-email" name="email" type="email" autocomplete="email" maxlength="254" required>
  </div>
  <div class="contact-field">
    <label for="contact-subject">Subject</label>
    <input id="contact-subject" name="subject" type="text" maxlength="150" required>
  </div>
  <div class="contact-field">
    <label for="contact-message">Message</label>
    <textarea id="contact-message" name="message" rows="8" maxlength="5000" required></textarea>
  </div>
  <div class="contact-honeypot" aria-hidden="true">
    <label for="contact-website"> Website </label>
    <input id="contact-website" name="website" type="text" tabindex="-1" autocomplete="off">
  </div>
  <div class="cf-turnstile" data-sitekey="0x4AAAAAADy94v3LKGOnSzTn" data-theme="auto"></div>
  <button id="contact-submit" type="submit">Send message</button>
  <p id="contact-status" class="contact-status" role="status" aria-live="polite"></p>
</form>

<script>
  ;(() => {
    const form = document.getElementById('contact-form')
    const button = document.getElementById('contact-submit')
    const status = document.getElementById('contact-status')

    const endpoint = "https://contact-worker.charlieyaris.workers.dev";

    form.addEventListener('submit', async event => {
      event.preventDefault()

      const formData = new FormData(form)
      const turnstileToken = formData.get('cf-turnstile-response')

      if (!turnstileToken) {
        status.textContent = 'Please complete the spam verification.'
        status.dataset.state = 'error'
        return
      }

      button.disabled = true
      button.textContent = 'Sending…'
      status.textContent = ''
      status.dataset.state = ''

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            name: formData.get('name'),
            email: formData.get('email'),
            subject: formData.get('subject'),
            message: formData.get('message'),
            website: formData.get('website'),
            turnstileToken,
          }),
        })

        const result = await response.json()

        if (!response.ok) {
          throw new Error(result.error || 'The message could not be sent.')
        }

        form.reset()
        turnstile.reset()

        status.textContent = 'Thank you. Your message has been sent.'
        status.dataset.state = 'success'
      } catch (error) {
        status.textContent = error.message || 'The message could not be sent. Please try again.'
        status.dataset.state = 'error'

        turnstile.reset()
      } finally {
        button.disabled = false
        button.textContent = 'Send message'
      }
    })
  })()
</script>
